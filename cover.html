<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cover Buku - Solidaritas Tech Modern</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0a0f1d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0;
            overflow: hidden;
        }
        .cover-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0a0f1d;
        }
        .cover-svg {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: 100%;
            object-fit: contain;
            box-shadow: 0 15px 40px rgba(0, 242, 254, 0.15);
        }
    </style>
</head>
<body>

    <div class="cover-container">
        <svg class="cover-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 750">
            <!-- Background Gradasi Midnight Blue Tech -->
            <defs>
                <linearGradient id="bgGradTech" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#020c1b" />
                    <stop offset="50%" stop-color="#0d1b2a" />
                    <stop offset="100%" stop-color="#1b263b" />
                </linearGradient>
                <!-- Gradasi Cyan ke Biru untuk Aksen Tekno -->
                <linearGradient id="techGlow" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#00f2fe" />
                    <stop offset="100%" stop-color="#4cc9f0" />
                </linearGradient>
            </defs>
            <rect width="500" height="750" fill="url(#bgGradTech)" />
            
            <!-- Bingkai Elegan Minimalis Platinum Silver & Cyan -->
            <rect x="15" y="15" width="470" height="720" fill="none" stroke="#415a77" stroke-width="2" rx="6"/>
            <rect x="22" y="22" width="456" height="706" fill="none" stroke="url(#techGlow)" stroke-width="1" stroke-opacity="0.5" rx="4"/>

            <!-- Ornamen Sudut Bergaya Sirkuit Digital -->
            <path d="M15 45 L35 45 L35 15 M485 45 L465 45 L465 15 M15 705 L35 705 L35 735 M485 705 L465 705 L465 735" fill="none" stroke="#00f2fe" stroke-width="2" opacity="0.7"/>

            <!-- Judul Utama: SOLIDARITAS (Clean Modern Serif) -->
            <text x="250" y="140" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="5">SOLIDARITAS</text>
            
            <!-- Sub Judul -->
            <text x="250" y="190" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="600" fill="#00f2fe" text-anchor="middle" letter-spacing="3">DALAM PERSPEKTIF</text>
            <text x="250" y="225" font-family="'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">HADITS TEMATIK</text>

            <!-- Ornamen Tengah (Mandala Geometris Digital) -->
            <g transform="translate(250, 275) scale(0.6)">
                <circle cx="0" cy="0" r="35" fill="none" stroke="#00f2fe" stroke-width="1" stroke-dasharray="4,4"/>
                <path d="M-25 0 L0 -25 L25 0 L0 25 Z" fill="none" stroke="#4cc9f0" stroke-width="2"/>
                <path d="M-18 -18 L18 -18 L18 21 L-18 21 Z" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
                <text x="0" y="7" font-family="serif" font-size="20" fill="#00f2fe" text-anchor="middle" font-weight="bold">﷽</text>
            </g>

            <!-- Ilustrasi Kubah Masjid Poligon/Minimalis Tech -->
            <g transform="translate(250, 480)">
                <!-- Basis Struktur Garis Grid Digital -->
                <path d="M-70 0 L-40 -45 L0 -60 L40 -45 L70 0 Z" fill="#0b132b" stroke="#00f2fe" stroke-width="2"/>
                <path d="M-50 0 L-25 -35 L0 -45 L25 -35 L50 0 Z" fill="none" stroke="#4cc9f0" stroke-width="1" opacity="0.4"/>
                
                <!-- Garis Vertikal Tech Glow -->
                <line x1="0" y1="0" x2="0" y2="-60" stroke="#00f2fe" stroke-width="1.5"/>
                <line x1="-40" y1="0" x2="-40" y2="-45" stroke="#4cc9f0" stroke-width="1" opacity="0.6"/>
                <line x1="40" y1="0" x2="40" y2="-45" stroke="#4cc9f0" stroke-width="1" opacity="0.6"/>

                <!-- Puncak Bulan Sabit Minimalis -->
                <circle cx="0" cy="-70" r="4" fill="#ffffff"/>
                <path d="M0 -75 C3 -75 5 -72 3 -69 C1 -66 -2 -66 -3 -69" fill="#00f2fe"/>
                
                <!-- Garis Horizontal Alas -->
                <rect x="-140" y="0" width="280" height="4" fill="url(#techGlow)" rx="2"/>
            </g>

            <!-- Garis Pembatas Kaki Elegan -->
            <line x1="120" y1="570" x2="380" y2="570" stroke="#1b263b" stroke-width="2"/>

            <!-- Nama Penulis & Editor -->
            <text x="250" y="615" font-family="'Segoe UI', sans-serif" font-size="14" fill="#abc4ff" text-anchor="middle">Editor: <tspan fill="#ffffff" font-weight="600">Khoirul Fahmi</tspan></text>
            <text x="250" y="645" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Muhammad Gufron</text>

            <!-- Teks Tambahan Kaki Cover -->
            <rect x="150" y="675" width="200" height="26" fill="none" stroke="#00f2fe" stroke-width="1.5" rx="13"/>
            <text x="250" y="692" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="900" fill="#00f2fe" text-anchor="middle" letter-spacing="2">PENERBIT WIDINA</text>
        </svg>
    </div>

</body>
</html>
